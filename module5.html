<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Module 5 · U · UNIFIER — Méthode V.A.L.E.U.R©</title>
<script src="valeur-config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#0d1117;--navy-card:#161b22;--navy-border:#21262d;--gold:#c9a84c;--gold-light:#e8c97a;--cream:#f5f0e8;--text-muted:#8b949e;--mask-color:#3182ce;--mask-bg:rgba(49,130,206,0.12);}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;overflow-x:hidden;}
body{background:var(--navy);font-family:'Jost',sans-serif;color:var(--cream);min-height:100vh;}
body.mask-rouge{--mask-color:#e53e3e;--mask-bg:rgba(229,62,62,0.12);}
body.mask-orange{--mask-color:#ed8936;--mask-bg:rgba(237,137,54,0.12);}
body.mask-jaune{--mask-color:#d69e2e;--mask-bg:rgba(214,158,46,0.12);}
body.mask-vert{--mask-color:#38a169;--mask-bg:rgba(56,161,105,0.12);}
body.mask-bleu{--mask-color:#3182ce;--mask-bg:rgba(49,130,206,0.12);}
body.mask-indigo{--mask-color:#5a67d8;--mask-bg:rgba(90,103,216,0.12);}
body.mask-violet{--mask-color:#805ad5;--mask-bg:rgba(128,90,213,0.12);}
#valeur-progress-bar{position:fixed;top:0;left:0;right:0;z-index:200;}
#hero-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
.phase{display:none;padding:80px 16px 48px;max-width:520px;margin:0 auto;position:relative;z-index:1;}
.phase.active{display:block;animation:fadeUp .4s ease-out both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
.hero-wrap{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:80px 16px 40px;}
.badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;background:var(--mask-bg);border:1px solid var(--mask-color);border-radius:20px;font-size:11px;font-weight:700;color:var(--mask-color);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:20px;}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(48px,12vw,72px);font-weight:700;color:var(--cream);line-height:1;margin-bottom:10px;}
.hero-sub{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold);font-style:italic;margin-bottom:28px;}
.hero-line{font-size:15px;color:var(--text-muted);line-height:2;opacity:0;transition:opacity .5s;}
.hero-line.vis{opacity:1;}
.hero-line.hi{color:var(--cream);font-weight:500;}
.btn-p{width:100%;padding:16px;background:linear-gradient(135deg,var(--mask-color),#4a9fd4);border:none;border-radius:14px;color:#fff;font-family:'Jost',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .3s;margin-top:8px;display:block;}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(49,130,206,.4);}
.btn-s{width:100%;padding:14px;background:transparent;border:1px solid var(--navy-border);border-radius:14px;color:var(--text-muted);font-family:'Jost',sans-serif;font-size:14px;cursor:pointer;transition:all .3s;margin-top:8px;display:block;}
.btn-s:hover{border-color:var(--gold);color:var(--gold);}
.btn-gold{width:100%;padding:16px;background:linear-gradient(135deg,var(--gold),var(--gold-light));border:none;border-radius:14px;color:#0d1117;font-family:'Jost',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .3s;margin-top:8px;display:block;}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,168,76,.5);}
.btn-copy{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;background:var(--mask-bg);border:1px solid var(--mask-color);border-radius:10px;color:var(--mask-color);font-family:'Jost',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .3s;margin-top:8px;}
.btn-copy:hover{background:var(--mask-color);color:#fff;}
.btn-validate{width:100%;padding:18px;background:linear-gradient(135deg,var(--gold),var(--gold-light));border:none;border-radius:14px;color:#0d1117;font-family:'Jost',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all .3s;margin-top:16px;opacity:.4;pointer-events:none;display:block;}
.btn-validate.on{opacity:1;pointer-events:all;box-shadow:0 8px 24px rgba(201,168,76,.4);}
.btn-validate.on:hover{transform:translateY(-2px);}
.card{background:var(--navy-card);border:1px solid var(--navy-border);border-radius:18px;padding:18px;margin-bottom:14px;}
.card-gold{background:linear-gradient(135deg,rgba(201,168,76,.07),rgba(201,168,76,.02));border:1px solid rgba(201,168,76,.25);border-radius:18px;padding:18px;margin-bottom:14px;}
.card-mask{background:var(--mask-bg);border:1px solid var(--mask-color);border-radius:18px;padding:18px;margin-bottom:14px;}
.eyebrow{font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--cream);margin-bottom:8px;line-height:1.2;}
.sec-desc{font-size:14px;color:var(--text-muted);line-height:1.8;margin-bottom:16px;}
.recall-quote{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--gold-light);font-style:italic;line-height:1.7;padding:14px;background:rgba(201,168,76,.06);border-left:3px solid var(--gold);border-radius:0 10px 10px 0;margin:10px 0;}
.recall-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--navy-border);font-size:13px;}
.recall-row:last-child{border-bottom:none;}
.recall-row span:first-child{color:var(--text-muted);}
.recall-row span:last-child{color:var(--cream);font-weight:500;text-align:right;max-width:60%;}
.tw-wrap{text-align:center;padding:20px 0;}
.tw-line{font-size:15px;color:var(--text-muted);line-height:2;opacity:0;transition:opacity .6s;}
.tw-line.vis{opacity:1;}
.tw-line.b{color:var(--cream);font-weight:600;}
.stepper{display:flex;align-items:center;margin-bottom:20px;}
.st-step{display:flex;flex-direction:column;align-items:center;gap:3px;flex:0 0 auto;}
.st-num{width:30px;height:30px;border-radius:50%;background:var(--navy-border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text-muted);transition:all .4s;}
.st-step.active .st-num{background:var(--mask-color);color:#fff;box-shadow:0 0 12px rgba(49,130,206,.5);}
.st-step.done .st-num{background:var(--gold);color:#0d1117;}
.st-lbl{font-size:10px;color:var(--text-muted);font-weight:500;}
.st-step.active .st-lbl{color:var(--mask-color);}
.st-step.done .st-lbl{color:var(--gold);}
.st-line{flex:1;height:2px;background:var(--navy-border);margin:0 4px 14px;}
.st-line.done{background:var(--gold);}
.q-block{display:none;}
.q-block.active{display:block;animation:fadeUp .35s ease-out both;}
.icon-anim{font-size:44px;text-align:center;margin:12px 0;display:block;animation:iconPulse 2.5s ease-in-out infinite;}
@keyframes iconPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
.comp-grid{display:grid;grid-template-columns:1fr 32px 1fr;gap:6px;align-items:start;margin:14px 0;}
.comp-col{border-radius:12px;padding:12px;}
.comp-avant{background:rgba(229,62,62,.08);border:1px solid rgba(229,62,62,.2);}
.comp-apres{background:rgba(56,161,105,.08);border:1px solid rgba(56,161,105,.2);}
.comp-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
.comp-avant .comp-lbl{color:#e53e3e;}
.comp-apres .comp-lbl{color:#38a169;}
.comp-txt{font-size:13px;color:var(--text-muted);line-height:1.6;}
.comp-arrow{display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--gold);animation:arrPulse 1.5s ease-in-out infinite;}
@keyframes arrPulse{0%,100%{opacity:.4;transform:scale(.9);}50%{opacity:1;transform:scale(1.1);}}
@media(max-width:420px){.comp-grid{grid-template-columns:1fr;}.comp-arrow{margin:4px 0;font-size:22px;transform:rotate(90deg);}}
details.sugg{background:rgba(201,168,76,.04);border:1px solid rgba(201,168,76,.2);border-radius:10px;margin-top:10px;overflow:hidden;}
details.sugg summary{padding:10px 14px;font-size:13px;color:var(--gold);cursor:pointer;font-weight:600;list-style:none;display:flex;align-items:center;gap:6px;}
details.sugg summary::-webkit-details-marker{display:none;}
details.sugg .si{padding:0 14px 12px;}
details.sugg li{font-size:13px;color:var(--text-muted);padding:5px 0;border-bottom:1px solid var(--navy-border);line-height:1.6;list-style:none;display:flex;gap:6px;}
details.sugg li:last-child{border-bottom:none;}
details.sugg li::before{content:"->>";color:var(--mask-color);flex-shrink:0;}
.act-btns{display:flex;gap:8px;margin:12px 0;}
.act
