// Sync données patient vers Supabase (fire & forget)
function syncPatientToSupabase(email, name, registeredAt) {
  sb.from('patients').upsert({
    email: email,
    name: name,
    registered_at: registeredAt || new Date().toISOString(),
    last_seen: new Date().toISOString()
  }).then(function() {}).catch(function() {});
}

// Sync données utilisateur vers Supabase (fire & forget)
function syncUserDataToSupabase(email) {
  var progress = loadUser(email, 'progress');
  var journal = loadUser(email, 'journal');
  var quizScores = loadUser(email, 'quizScores');
  sb.from('user_data').upsert({
    email: email,
    progress: progress || { completedSections: [] },
    journal: journal || [],
    quiz_scores: quizScores || {},
    updated_at: new Date().toISOString()
  }).then(function() {}).catch(function() {});
}

// Charger données depuis Supabase et hydrater localStorage
async function hydrateFromSupabase(email) {
  try {
    var result = await sb.from('user_data').select('*').eq('email', email).single();
    if (result.data) {
      var d = result.data;
      if (d.progress) localStorage.setItem("valeur_" + email + "_progress", JSON.stringify(d.progress));
      if (d.journal) localStorage.setItem("valeur_" + email + "_journal", JSON.stringify(d.journal));
      if (d.quiz_scores) localStorage.setItem("valeur_" + email + "_quizScores", JSON.stringify(d.quiz_scores));
    }
  } catch(e) {}
}

// Charger tous les patients depuis Supabase
async function loadPatientsFromSupabase() {
  try {
    var result = await sb.from('patients').select('*').neq('email', ADMIN_EMAIL);
    return result.data || [];
  } catch(e) { return []; }
}
