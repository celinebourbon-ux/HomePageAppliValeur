function syncPatientToSupabase(email,name,registeredAt){sb.from('patients').upsert({email:email,name:name,registered_at:registeredAt||new Date().toISOString(),last_seen:new Date().toISOString()}).then(function(){}).catch(function(){})}
function syncUserDataToSupabase(email){var progress=loadUser(email,'progress');var journal=loadUser(email,'journal');var quizScores=loadUser(email,'quizScores');sb.from('user_data').upsert({email:email,progress:progress||{completedSections:[]},journal:journal||[],quiz_scores:quizScores||{},updated_at:new Date().toISOString()}).then(function(){}).catch(function(){})}
async function hydrateFromSupabase(email){try{var result=await sb.from('user_data').select('*').eq('email',email).single();if(result.data){var d=result.data;if(d.progress)localStorage.setItem("valeur_"+email+"_progress",JSON.stringify(d.progress));if(d.journal)localStorage.setItem("valeur_"+email+"_journal",JSON.stringify(d.journal));if(d.quiz_scores)localStorage.setItem("valeur_"+email+"_quizScores",JSON.stringify(d.quiz_scores))}}catch(e){}}
async function loadPatientsFromSupabase(){try{var result=await sb.from('patients').select('*').neq('email',ADMIN_EMAIL);return result.data||[]}catch(e){return[]}}

function loadUser(email,key){try{var v=localStorage.getItem("valeur_"+email+"_"+key);return v?JSON.parse(v):null}catch(_){return null}}
function saveUser(email,key,val){try{localStorage.setItem("valeur_"+email+"_"+key,JSON.stringify(val));if(key==='progress'||key==='journal'||key==='quizScores'){syncUserDataToSupabase(email)}}catch(_){}}
function loadRegistry(){try{var v=localStorage.getItem('valeur_registry');return v?JSON.parse(v):[]}catch(_){return[]}}
function addToRegistry(email,name,date){var reg=loadRegistry();if(!reg.find(function(u){return u.email===email})){reg.push({email:email,name:name,registeredAt:date,lastSeen:date});try{localStorage.setItem('valeur_registry',JSON.stringify(reg))}catch(_){}}else{var updated=reg.map(function(u){return u.email===email?_objectSpread(_objectSpread({},u),{},{lastSeen:date}):u});try{localStorage.setItem('valeur_registry',JSON.stringify(updated))}catch(_){}}syncPatientToSupabase(email,name,date)}
function updateRegistry(email,fields){var reg=loadRegistry();var updated=reg.map(function(u){return u.email===email?_objectSpread(_objectSpread({},u),fields):u});try{localStorage.setItem('valeur_registry',JSON.stringify(updated))}catch(_){}sb.from('patients').update({last_seen:new Date().toISOString()}).eq('email',email).then(function(){}).catch(function(){})}
