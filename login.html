<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V.A.L.E.U.R© — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none}
:root{
  --gold:#c9a84c;--gold-light:#e8c97a;--gold-dim:rgba(201,168,76,0.15);
  --navy:#0a0d14;--navy2:#0f1320;--navy3:#141828;
  --glass:rgba(255,255,255,0.04);--glass-border:rgba(201,168,76,0.2);
  --text:#f0ead8;--text-dim:rgba(240,234,216,0.5);
}
html,body{height:100%;overflow:hidden}
body{
  background:var(--navy);
  font-family:'Jost',sans-serif;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}

/* ANIMATED BG */
.bg-orbs{position:fixed;inset:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.18;animation:drift 12s ease-in-out infinite}
.orb1{width:500px;height:500px;background:radial-gradient(circle,#4a0080,transparent);top:-100px;left:-100px;animation-delay:0s}
.orb2{width:400px;height:400px;background:radial-gradient(circle,#c9a84c,transparent);bottom:-80px;right:-80px;animation-delay:-4s}
.orb3{width:300px;height:300px;background:radial-gradient(circle,#003366,transparent);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-8s}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-20px) scale(1.08)}}

/* GRID TEXTURE */
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(201,168,76,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,0.03) 1px,transparent 1px);
  background-size:60px 60px;pointer-events:none;
}

/* CARD */
.card{
  position:relative;z-index:10;
  width:min(420px,90vw);
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:24px;
  padding:56px 48px 48px;
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  box-shadow:0 0 60px rgba(201,168,76,0.08),0 32px 64px rgba(0,0,0,0.5),inset 0 1px 0 rgba(201,168,76,0.15);
  animation:cardIn 0.8s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(32px) scale(0.96)}to{opacity:1;transform:none}}

/* LOGO */
.logo-wrap{text-align:center;margin-bottom:40px}
.logo-icon{
  width:72px;height:72px;margin:0 auto 20px;
  background:linear-gradient(135deg,var(--gold-dim),rgba(201,168,76,0.05));
  border:1px solid rgba(201,168,76,0.3);
  border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  font-size:32px;
  box-shadow:0 0 30px rgba(201,168,76,0.15),inset 0 1px 0 rgba(255,255,255,0.1);
  animation:pulse 3s ease-in-out infinite;
}
@keyframes pulse{0%,100%{box-shadow:0 0 30px rgba(201,168,76,0.15),inset 0 1px 0 rgba(255,255,255,0.1)}50%{box-shadow:0 0 50px rgba(201,168,76,0.3),inset 0 1px 0 rgba(255,255,255,0.1)}}
.logo-title{
  font-family:'Cormorant Garamond',serif;
  font-size:2rem;font-weight:600;letter-spacing:0.15em;
  color:var(--gold);white-space:nowrap;
}
.logo-sub{
  font-family:'Cormorant Garamond',serif;
  font-size:0.85rem;font-weight:300;font-style:italic;
  color:var(--text-dim);margin-top:8px;line-height:1.5;
}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,0.3),transparent)}
.divider span{font-size:0.65rem;letter-spacing:0.2em;color:var(--text-dim);text-transform:uppercase}

/* FORM */
.field{margin-bottom:20px}
.field label{
  display:block;font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--gold);margin-bottom:10px;font-weight:500;
}
.field input{
  width:100%;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(201,168,76,0.2);
  border-radius:12px;
  padding:14px 18px;
  font-family:'Jost',sans-serif;font-size:0.9rem;font-weight:300;
  color:var(--text);
  outline:none;
  transition:all 0.3s ease;
  letter-spacing:0.05em;
}
.field input::placeholder{color:rgba(240,234,216,0.25)}
.field input:focus{
  border-color:rgba(201,168,76,0.5);
  background:rgba(201,168,76,0.05);
  box-shadow:0 0 0 3px rgba(201,168,76,0.08);
}

/* BTN */
.btn{
  width:100%;margin-top:8px;
  padding:16px;
  background:linear-gradient(135deg,var(--gold),#a8792a);
  border:none;border-radius:12px;
  font-family:'Jost',sans-serif;font-size:0.85rem;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;
  color:#0a0d14;cursor:pointer;
  transition:all 0.3s ease;
  position:relative;overflow:hidden;
}
.btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent);
  opacity:0;transition:opacity 0.3s;
}
.btn:hover::before{opacity:1}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 30px rgba(201,168,76,0.4)}
.btn:active{transform:translateY(0)}

/* ERROR */
.error-msg{
  display:none;text-align:center;
  font-size:0.78rem;color:#e05555;
  background:rgba(224,85,85,0.08);border:1px solid rgba(224,85,85,0.2);
  border-radius:8px;padding:10px 14px;margin-top:16px;
}
.error-msg.show{display:block;animation:shake 0.4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* FOOTER NOTE */
.foot-note{
  text-align:center;margin-top:28px;
  font-size:0.7rem;color:var(--text-dim);letter-spacing:0.05em;line-height:1.8;
}
.foot-note a{color:var(--gold);text-decoration:none;opacity:0.7}

/* NO COPY */
img{pointer-events:none}
</style>
</head>
<body>
<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="card">
  <div class="logo-wrap">
    <div class="logo-icon">✦</div>
    <div class="logo-title">V.A.L.E.U.R©</div>
    <div class="logo-sub">Les 7 peurs qui empêchent d'être soi</div>
  </div>

  <div class="divider"><span>Accès membres</span></div>

  <div class="field">
    <label>Votre email</label>
    <input type="email" id="email" placeholder="prenom@exemple.com" autocomplete="email">
  </div>
  <div class="field">
    <label>Code d'accès</label>
    <input type="text" id="code" placeholder="••••••••••" autocomplete="off" style="letter-spacing:0.3em">
  </div>

  <button class="btn" onclick="doLogin()">Entrer dans mon parcours →</button>
  <div class="error-msg" id="err">Code incorrect. Contactez l'administrateur.</div>

  <div class="foot-note">
    Méthode V.A.L.E.U.R© — Céline Bourbon<br>
    <em>"De la peur à la joie d'être soi"</em> — Éd. L'Harmattan<br>
    <small>Problème de connexion ? <a href="#">Contactez l'administrateur</a></small>
  </div>
</div>

<script>
// Anti-copy
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('keydown',e=>{if(e.ctrlKey&&['c','u','s','a','p'].includes(e.key))e.preventDefault()});
document.addEventListener('dragstart',e=>e.preventDefault());
document.addEventListener('selectstart',e=>{
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
    e.preventDefault();
  });

function doLogin(){
  const email=document.getElementById('email').value.trim();
  const code=document.getElementById('code').value.trim().toUpperCase();
  const err=document.getElementById('err');
  if(code==='VALEUR2025'&&email.includes('@')){
    localStorage.setItem('valeur_email',email);
    localStorage.setItem('valeur_auth','1');
    // Pont de compatibilité : alimenter le système session des modules
    var sessionObj = { email: email, loginAt: new Date().toISOString() };
    localStorage.setItem('valeur_' + email + '_session', JSON.stringify(sessionObj));
    var registry = [];
    try { registry = JSON.parse(localStorage.getItem('valeur_registry') || '[]'); } catch(e) {}
    if (!registry.find(function(r){ return r.email === email; })) {
      registry.push({ email: email });
      localStorage.setItem('valeur_registry', JSON.stringify(registry));
    }
    document.querySelector('.btn').textContent='Bienvenue ✦';
    document.querySelector('.btn').style.background='linear-gradient(135deg,#4caf50,#2e7d32)';
    setTimeout(()=>window.location.href='dashboard.html',700);
  } else {
    err.className='error-msg show';
    setTimeout(()=>err.className='error-msg',3000);
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
</script>
</body>
</html>
