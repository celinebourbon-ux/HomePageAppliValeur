// ── STORAGE ───────────────────────────────────────────────────────
function loadUser(email, key) {
  try { var v = localStorage.getItem("valeur_" + email + "_" + key); return v ? JSON.parse(v) : null; }
  catch(e) { return null; }
}
function saveUser(email, key, val) {
  try { localStorage.setItem("valeur_" + email + "_" + key, JSON.stringify(val)); }
  catch(e) {}
}
function syncProgress(email) {
  var prog = loadUser(email, "progress");
  var journal = loadUser(email, "journal");
  sb.from("user_data").upsert({email:email, progress:prog||{}, journal:journal||[], updated_at:new Date().toISOString()})
    .then(function(){}).catch(function(){});
}
function saveSync(email, key, val) {
  saveUser(email, key, val);
  if (key === "progress" || key === "journal") syncProgress(email);
}

// ── AUTH ──────────────────────────────────────────────────────────
function getSession() {
  try {
    var keys = Object.keys(localStorage).filter(function(k){ return k.endsWith("_session"); });
    for (var i = 0; i < keys.length; i++) {
      var s = JSON.parse(localStorage.getItem(keys[i]));
      if (s && s.loginAt) {
        var age = (new Date() - new Date(s.loginAt)) / 1000 / 3600 / 24;
        if (age < 7) return s;
      }
    }
  } catch(e) {}
  return null;
}
function isModule1Unlocked(email) {
  var prog = loadUser(email, "progress") || {};
  return (prog.completedSections || []).length >= 4;
}
function markModule1Done(email, name) {
  var prog = loadUser(email, "progress") || {};
  var mods = prog.completedModules || [];
  if (mods.indexOf(1) === -1) {
    mods = mods.concat([1]);
    saveSync(email, "progress", Object.assign({}, prog, {
      completedModules: mods,
      module1Complete: true,
      module1CompletedAt: new Date().toISOString()
    }));
    if (typeof emailjs !== "undefined") {
      emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
        to_email: "celine.bourbon@gmail.com",
        patient_email: email,

function Confetti() {
  var colors = [C.gold, C.vert, C.violet, C.rouge, C.bleu, "#fff"];
  var pieces = [];
  for (var i = 0; i < 50; i++) {
    var left = Math.random() * 100;
    var delay = Math.random() * 2;
    var dur = 2 + Math.random() * 2;
    var size = 6 + Math.random() * 8;
    var col = colors[Math.floor(Math.random() * colors.length)];
    pieces.push(h("div", { key:i, style:{
      position:"fixed", left:left+"%", top:"-20px", width:size+"px", height:size+"px",
      background:col, borderRadius:Math.random()>0.5?"50%":"2px",
      animation:"confettiFall "+dur+"s "+delay+"s ease-in both",
      zIndex:10000, pointerEvents:"none"
    }}));
  }
  return h("div", { style:{ position:"fixed", inset:0, pointerEvents:"none", zIndex:9999 } }, pieces);
}

            h("div", { style:{ display:"flex", gap:"10px", marginBottom:"6px" } },
              mask && h("span", { style:{ fontSize:"18px" } }, mask.emoji),
              h("p", { style:{ color:mask?mask.color:C.cream, fontWeight:700, fontSize:"13px", margin:0 } },
                mask ? mask.nom : "Masque inconnu"
              ),
              h("span", { style:{ color:C.rouge, fontSize:"12px", marginLeft:"auto" } }, c.intensite, "/10")
            ),
            h("p", { style:{ color:C.textMuted, fontSize:"12px", lineHeight:1.5, margin:0 } }, c.situation)
          );
        })
      )
    ),

    h(JournalBox, { email:props.email, sectionIndex:2 }),

    h("div", { style:{ textAlign:"center", marginTop:"28px" } },
      h(Btn, { onClick:props.onComplete, color:C.rouge, full:true }, "Valider mes connaissances →")
    ),
    h(Copyright, null)
  );
}

// ── SECTION 4 — QUIZ ──────────────────────────────────────────────
function S4_Quiz(props) {
  var cs = useState(0);
  var current = cs[0]; var setCurrent = cs[1];
  var ss = useState(null);
  var selected = ss[0]; var setSelected = ss[1];
  var rs = useState(false);
  var revealed = rs[0]; var setRevealed = rs[1];
  var res = useState([]);
  var results = res[0]; var setResults = res[1];
  var ds = useState(false);
  var done = ds[0]; var setDone = ds[1];

  var q = QUIZ_QUESTIONS[current];
  var score = results.filter(Boolean).length;

  function select(i) {
    if (revealed) return;
    setSelected(i);
    setRevealed(true);
    var newResults = results.concat([i === q.ok]);
    setResults(newResults);
    if (current === QUIZ_QUESTIONS.length - 1) {
      var finalScore = newResults.filter(Boolean).length;
      var scores = loadUser(props.email, "quizScores") || {};
      scores.module1 = finalScore;
      saveUser(props.email, "quizScores", scores);
    }
  }

  function next() {
    if (current < QUIZ_QUESTIONS.length - 1) {
      setCurrent(current + 1);
      setSelected(null);
      setRevealed(false);
    } else {
      setDone(true);
    }
  }

  if (done) {
    var pct = Math.round(score / QUIZ_QUESTIONS.length * 100);
    var great = pct >= 80;
    return h("div", { style:{ padding:"28px 16px", maxWidth:"720px", margin:"0 auto", textAlign:"center" } },
      h("div", { style:{ fontSize:"56px", marginBottom:"14px" } }, great ? "🏆" : "💪"),
      h("div", { style:{ background:"linear-gradient(135deg,"+(great?C.gold:C.orange)+"22,transparent)",
        border:"2px solid "+(great?C.gold:C.orange), borderRadius:"20px", padding:"28px", marginBottom:"20px" } },
        h("p", { style:{ color:great?C.gold:C.orange, fontWeight:800, fontSize:"36px", margin:"0 0 8px" } },
          score, "/", QUIZ_QUESTIONS.length
        ),
        h("p", { style:{ color:C.cream, fontWeight:700, fontSize:"18px", margin:0 } },
          great ? "Excellent ! Module 1 maîtrisé !" : "Bon début — continuez à vous exercer"
        )
      ),
      h("div", { style:{ background:"#0d2010", border:"1px solid "+C.vert, borderRadius:"12px",
        padding:"18px", marginBottom:"24px", textAlign:"left" } },
        h("p", { style:{ color:C.vertLight, fontSize:"14px", lineHeight:1.8, margin:0 } },
          great
            ? "Vous avez compris l'essentiel de l'étape VOIR. Vous êtes maintenant prêt à identifier vos déclencheurs dans la vie réelle. La prochaine étape : ACCUEILLIR."
            : "Pas d'inquiétude — la pratique viendra avec le temps. Continuez à utiliser la carte du déclencheur chaque jour. La compréhension s'approfondit avec l'expérience."
        )
      ),
      h("button", {
        onClick: function(){ props.onComplete(); },
        style:{ background:"linear-gradient(135deg,"+C.gold+",#a07830)", color:"#000", border:"none",
          borderRadius:"50px", padding:"16px 36px", fontSize:"16px", fontWeight:800,
          cursor:"pointer", width:"100%", marginBottom:"12px" }
      }, "Terminer le Module 1 ✓"),
      h(Copyright, null)
    );
  }

  return h("div", { style:{ padding:"28px 16px", maxWidth:"720px", margin:"0 auto" } },

    h("div", { style:{ textAlign:"center", marginBottom:"24px" } },
      h("h2", { style:{ fontFamily:"Georgia,serif", fontSize:"clamp(22px,5vw,28px)", color:C.cream, marginBottom:"8px" } },
        "Quiz — Module 1 VOIR"
      ),
      h("p", { style:{ color:C.textMuted, fontSize:"14px" } },
        "5 questions pour valider votre compréhension"
      )
    ),

    h("div", { style:{ display:"flex", gap:"4px", marginBottom:"20px" } },
      QUIZ_QUESTIONS.map(function(_, i) {
        return h("div", { key:i, style:{ flex:1, height:"4px", borderRadius:"2px",
          background: i < current ? C.rouge : i === current ? C.rouge+"88" : C.navyBorder } });
      })
    ),

    h("div", { style:{ display:"flex", justifyContent:"space-between", marginBottom:"20px" } },
      h("span", { style:{ color:C.rouge, fontWeight:700, fontSize:"13px" } }, "Question ", current+1, "/", QUIZ_QUESTIONS.length),
      h("span", { style:{ color:C.vert, fontSize:"13px" } }, score, " ✓")
    ),

    h("p", { style:{ color:C.cream, fontSize:"clamp(15px,4vw,18px)", fontWeight:700, lineHeight:1.5, marginBottom:"20px" } },
      q.q
    ),

    h("div", { style:{ display:"flex", flexDirection:"column", gap:"8px", marginBottom:"20px" } },
      q.opts.map(function(opt, i) {
        var bg = C.navyCard, border = C.navyBorder, col = C.textLight;
        if (revealed) {
          if (i === q.ok) { bg = "#0d2010"; border = C.vert; col = C.vertLight; }
          else if (i === selected) { bg = "#2d1515"; border = C.rouge; col = C.rougeLight; }
        } else if (selected === i) {
          border = C.rouge;
        }
        return h("button", {
          key: i,
          onClick: function(){ select(i); },
          style:{ background:bg, border:"2px solid "+border, borderRadius:"12px",
            padding:"14px 18px", color:col, cursor:revealed?"default":"pointer",
            textAlign:"left", fontSize:"clamp(13px,3.5vw,15px)", lineHeight:1.5 }
        },
          i === q.ok && revealed ? "✓ " : i === selected && i !== q.ok && revealed ? "✗ " : "",
          opt
        );
      })
    ),

    revealed && h("div", { style:{ background:"#1a2520", border:"1px solid "+C.vert,
      borderRadius:"10px", padding:"14px", marginBottom:"16px" } },
      h("p", { style:{ color:C.vertLight, fontSize:"13px", lineHeight:1.7, margin:0 } }, "💡 ", q.exp)
    ),

    revealed && h("button", {
      onClick: next,
      style:{ width:"100%", background:"linear-gradient(135deg,"+C.rouge+",#c0392b)",
        border:"none", borderRadius:"12px", padding:"14px", color:"#fff",
        fontWeight:700, fontSize:"16px", cursor:"pointer" }
    }, current < QUIZ_QUESTIONS.length - 1 ? "Question suivante →" : "Voir mes résultats 🎉"),

    h(Copyright, null)
  );
}

// ── MODULE 1 WRAPPER ──────────────────────────────────────────────
function Module1(props) {
  var m1prog = loadUser(props.email, "m1_progress") || { completedSections:[] };
  var cs = useState(m1prog.completedSections || []);
  var completed = cs[0]; var setCompleted = cs[1];
  var stStep = useState(Math.min(completed.length, 3));
  var step = stStep[0]; var setStep = stStep[1];
  var confState = useState(false);
  var showConf = confState[0]; var setShowConf = confState[1];
  var topRef = useRef(null);

  var session = getSession();
  var name = session ? session.name : "";

  function complete(i) {
    var newCompleted = completed.indexOf(i) === -1 ? completed.concat([i]) : completed;
    var newProg = Object.assign({}, m1prog, {
      completedSections: newCompleted,
      lastVisit: new Date().toISOString()
    });
    saveSync(props.email, "m1_progress", newProg);
    setCompleted(newCompleted);
    if (i === 3) {
      markModule1Done(props.email, name);
      setShowConf(true);
    } else {
      setStep(i + 1);
      if (topRef.current) topRef.current.scrollIntoView({ behavior:"smooth" });
    }
  }

  return h("div", { ref:topRef },

    showConf && h("div", { style:{ position:"fixed", inset:0, background:"rgba(0,0,0,0.8)", zIndex:9000,
      display:"flex", alignItems:"center", justifyContent:"center", padding:"20px" } },
      h(Confetti, null),
      h("div", { className:"scale-in", style:{ background:"linear-gradient(135deg,#1a2235,#0d1117)",
        border:"2px solid "+C.gold, borderRadius:"24px", padding:"36px 28px",
        maxWidth:"400px", width:"100%", textAlign:"center" } },
        h("div", { style:{ fontSize:"64px", marginBottom:"16px", animation:"float 2s ease-in-out infinite" } }, "👁️"),
        h("div", { style:{ background:C.gold+"22", border:"1px solid "+C.gold+"44",
          borderRadius:"20px", padding:"4px 14px", display:"inline-block", marginBottom:"14px" } },
          h("span", { style:{ color:C.gold, fontSize:"11px", fontWeight:700, letterSpacing:"2px", textTransform:"uppercase" } },
            "Module 1 complété ✓"
          )
        ),
        h("h2", { style:{ fontFamily:"Georgia,serif", color:C.cream, fontSize:"22px", lineHeight:1.3, marginBottom:"14px" } },
          "Vous voyez maintenant vos masques en action"
        ),
        h("p", { style:{ color:C.textMuted, fontSize:"14px", lineHeight:1.8, marginBottom:"24px" } },
          "Chaque déclencheur identifié est un pas de plus vers votre nature authentique."
        ),
        h("button", {
          onClick: function(){ window.location.href = "index.html"; },
          style:{ background:"linear-gradient(135deg,"+C.gold+",#a07830)", color:"#000", border:"none",
            borderRadius:"50px", padding:"14px 32px", fontSize:"16px", fontWeight:800, cursor:"pointer", width:"100%" }
        }, "Retour au tableau de bord →")
      )
    ),

    h(ProgressBar, { step:step, setStep:setStep, completed:completed }),

    h("div", { style:{ background:C.navyMid, borderBottom:"1px solid "+C.navyBorder, padding:"6px 16px", textAlign:"center" } },
      h("span", { style:{ color:C.rouge, fontSize:"12px", fontWeight:700 } },
        "Module 1 — VOIR · ", SECTION_LABELS[step], " · ", completed.length, "/4 sections"
      )
    ),

    step === 0 && h(S1_Intro, { email:props.email, onComplete:function(){ complete(0); } }),
    step === 1 && h(S2_Declencheurs, { email:props.email, onComplete:function(){ complete(1); } }),
    step === 2 && h(S3_Pratique, { email:props.email, onComplete:function(){ complete(2); } }),
    step === 3 && h(S4_Quiz, { email:props.email, onComplete:function(){ complete(3); } })
  );
}

// ── NAVBAR ────────────────────────────────────────────────────────
function NavBar(props) {
  var prog = loadUser(props.email, "m1_progress") || {};
  var pct = Math.round(((prog.completedSections || []).length) / 4 * 100);
  return h("div", { style:{ position:"sticky", top:0, zIndex:100, background:C.navy, borderBottom:"1px solid "+C.navyBorder } },
    h("div", { style:{ display:"flex", alignItems:"center", justifyContent:"space-between",
      padding:"10px 16px", maxWidth:"800px", margin:"0 auto" } },
      h("button", {
        onClick: function(){ window.location.href = "index.html"; },
        style:{ background:"none", border:"none", cursor:"pointer", display:"flex", alignItems:"center", gap:"8px" }
      },
        h("div", { style:{ background:"linear-gradient(135deg,"+C.gold+",#a07830)", width:"28px", height:"28px",
          borderRadius:"8px", display:"flex", alignItems:"center", justifyContent:"center",
          fontSize:"14px", fontWeight:900, color:"#000" } }, "V"),
        h("span", { style:{ color:C.textMuted, fontSize:"12px" } }, "← Dashboard")
      ),
      h("div", { style:{ background:"linear-gradient(135deg,"+C.rouge+"22,transparent)",
        border:"1px solid "+C.rouge+"44", borderRadius:"20px", padding:"4px 14px" } },
        h("span", { style:{ color:C.rouge, fontSize:"12px", fontWeight:700, letterSpacing:"1px" } }, "MODULE 1 · VOIR")
      ),
      h("div", { style:{ width:"36px", height:"36px", borderRadius:"50%", background:C.navyCard,
        border:"2px solid "+(pct===100?C.vert:pct>0?C.rouge:C.navyBorder),
        display:"flex", alignItems:"center", justifyContent:"center" } },
        h("span", { style:{ color:pct===100?C.vert:pct>0?C.rouge:C.textMuted, fontSize:"10px", fontWeight:700 } }, pct, "%")
      )
    )
  );
}

// ── ACCESS DENIED ─────────────────────────────────────────────────
function AccessDenied() {
  return h("div", { style:{ minHeight:"100vh", background:C.navy, display:"flex", alignItems:"center", justifyContent:"center", padding:"20px" } },
    h("div", { style:{ textAlign:"center", maxWidth:"420px" } },
      h("div", { style:{ fontSize:"64px", marginBottom:"16px" } }, "🔒"),
      h("h2", { style:{ fontFamily:"Georgia,serif", color:C.cream, fontSize:"22px", marginBottom:"12px" } },
        "Module 1 non encore accessible"
      ),
      h("p", { style:{ color:C.textMuted, fontSize:"14px", lineHeight:1.7, marginBottom:"24px" } },
        "Pour accéder au Module 1, vous devez d'abord terminer le Module 0 (4 sections sur 4)."
      ),
      h("button", {
        onClick: function(){ window.location.href = "index.html"; },
        style:{ background:"linear-gradient(135deg,"+C.gold+",#a07830)", color:"#000", border:"none",
          borderRadius:"50px", padding:"14px 32px", fontSize:"15px", fontWeight:700, cursor:"pointer" }
      }, "Retourner au Module 0 →"),
      h(Copyright, null)
    )
  );
}

// ── APP ───────────────────────────────────────────────────────────
function App() {
  var session = getSession();
  if (!session) {
    window.location.href = "index.html";
    return null;
  }
  if (!isModule1Unlocked(session.email)) {
    return h(AccessDenied, null);
  }
  return h("div", { style:{ background:C.navy, minHeight:"100vh" } },
    h(NavBar, { email:session.email }),
    h(Module1, { email:session.email }),
    h("div", { style:{ position:"fixed", bottom:"6px", right:"10px", opacity:0.2, pointerEvents:"none" } },
      h("p", { style:{ color:C.textMuted, fontSize:"9px", margin:0 } }, "© V.A.L.E.U.R© · M1 · C. Bourbon")
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App, null));
</script>
</body>
</html>
