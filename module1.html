/* ── STORAGE HELPERS ── */
function loadUser(email,key){try{var v=localStorage.getItem("valeur_"+email+"_"+key);return v?JSON.parse(v):null}catch(_){return null}}
function saveUser(email,key,val){try{localStorage.setItem("valeur_"+email+"_"+key,JSON.stringify(val))}catch(_){}}

/* ── SESSION CHECK ── */
function getSession(){
  try{
    var reg=JSON.parse(localStorage.getItem('valeur_registry')||'[]');
    for(var i=0;i<reg.length;i++){
      var u=reg[i];
      var s=loadUser(u.email,'session');
      if(s&&s.loginAt){
        var age=(new Date()-new Date(s.loginAt))/1000/3600/24;
        if(age<7)return s;
      }
    }
  }catch(e){}
  return null;
}
